<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haddock v0.1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <!-- Animated background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div id="app">
      <!-- Header -->
      <header>
        <div class="header-left">
          <div class="logo-mark">
            <svg viewBox="0 0 512 512" width="22" height="22">
              <path d="M310 195L310 260C310 310 360 320 370 280C380 240 370 195 340 190Z" fill="currentColor"/>
              <ellipse cx="328" cy="195" rx="22" ry="10" fill="currentColor" opacity="0.6"/>
              <path d="M310 255C280 270 230 275 190 270C150 265 125 280 108 310L95 340L108 348L122 318C138 290 155 278 195 282C235 287 280 282 310 268" fill="currentColor"/>
              <path d="M95 340L80 360C78 364 82 368 86 366L108 348Z" fill="currentColor" opacity="0.7"/>
              <path d="M320 185C315 160 330 145 322 120C314 95 328 75 320 50" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
              <path d="M338 182C342 155 330 140 340 115C350 90 338 65 345 40" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
            </svg>
          </div>
          <div>
            <h1>Haddock</h1>
            <span class="version">UI for <a id="sherlock-link" href="#">Sherlock OSINT</a></span>
          </div>
        </div>
        <div class="header-badges">
          <div id="tor-status" class="dep-status tor-badge hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span id="tor-text">Tor</span>
          </div>
          <div id="dep-status" class="dep-status">
            <span id="dep-dot" class="dot dot-checking"></span>
            <span id="dep-text">Initializing...</span>
          </div>
        </div>
      </header>

      <!-- Search -->
      <section class="search-section">
        <form id="search-form">
          <div class="search-bar">
            <div class="search-input-wrap">
              <div class="search-glow"></div>
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input
                type="text"
                id="username-input"
                placeholder="Search usernames across 400+ networks..."
                autocomplete="off"
                spellcheck="false"
              />
              <div class="input-hint">Space to separate multiple usernames</div>
            </div>
            <button type="submit" id="search-btn" class="btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              Scan
            </button>
            <button type="button" id="cancel-btn" class="btn btn-cancel hidden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
              </svg>
              Stop
            </button>
          </div>
        </form>
      </section>

      <!-- Options -->
      <section class="options-section">
        <button type="button" id="options-toggle" class="options-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/>
            <line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/>
            <line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/>
            <line x1="1" x2="7" y1="14" y2="14"/><line x1="9" x2="15" y1="8" y2="8"/>
            <line x1="17" x2="23" y1="16" y2="16"/>
          </svg>
          Parameters
          <svg id="options-chevron" class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>

        <div id="options-panel" class="options-panel hidden">
          <div class="options-grid">
            <div class="option-group">
              <label for="opt-timeout">Timeout (s)</label>
              <input type="number" id="opt-timeout" value="60" min="1" max="300" />
            </div>

            <div class="option-group">
              <label for="opt-proxy">Proxy</label>
              <input type="text" id="opt-proxy" placeholder="socks5://127.0.0.1:1080" />
            </div>

            <div class="option-group option-group-wide">
              <label for="opt-sites">Target sites</label>
              <input type="text" id="opt-sites" placeholder="GitHub, Twitter, Instagram..." />
            </div>

            <div class="option-group"><div class="toggle-row">
              <label class="toggle-label" for="opt-nsfw">NSFW sites</label>
              <label class="toggle-switch"><input type="checkbox" id="opt-nsfw" /><span class="toggle-slider"></span></label>
            </div></div>

            <div class="option-group"><div class="toggle-row">
              <label class="toggle-label" for="opt-print-all">Show all sites</label>
              <label class="toggle-switch"><input type="checkbox" id="opt-print-all" /><span class="toggle-slider"></span></label>
            </div></div>

            <div class="option-group"><div class="toggle-row">
              <label class="toggle-label" for="opt-browse">Auto-open browser</label>
              <label class="toggle-switch"><input type="checkbox" id="opt-browse" /><span class="toggle-slider"></span></label>
            </div></div>

            <div class="option-group"><div class="toggle-row">
              <label class="toggle-label" for="opt-tor">Use Tor (anonymous)</label>
              <label class="toggle-switch"><input type="checkbox" id="opt-tor" /><span class="toggle-slider"></span></label>
            </div></div>

          </div>
        </div>
      </section>

      <!-- Progress -->
      <div id="progress-section" class="progress-section hidden">
        <div class="progress-info">
          <span id="progress-text" class="progress-text"></span>
          <span id="progress-counter" class="progress-counter"></span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <!-- Results toolbar -->
      <div id="results-toolbar" class="results-toolbar hidden">
        <div class="toolbar-left">
          <h2>Discovered</h2>
          <span id="result-count" class="badge">0</span>
          <span id="not-found-count" class="badge badge-muted hidden">0 not found</span>
        </div>
        <div class="toolbar-right">
          <input type="text" id="filter-input" class="filter-input" placeholder="Filter..." />
          <button type="button" id="copy-btn" class="btn btn-ghost" title="Copy all URLs" aria-label="Copy all URLs">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
            </svg>
          </button>
          <button type="button" id="clear-btn" class="btn btn-ghost" title="Clear results" aria-label="Clear results">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Results grid -->
      <div id="results-grid" class="results-grid"></div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <div class="empty-orb">
          <div class="orb-ring"></div>
          <div class="orb-ring orb-ring-2"></div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <p class="empty-title">Ready to scan</p>
        <p class="empty-sub">Enter a username to discover linked accounts across 400+ platforms</p>
      </div>
    </div>

    <!-- Debug bottom sheet -->
    <div id="debug-console" class="debug-sheet collapsed">
      <div class="debug-sheet-header">
        <span>// console</span>
        <div class="debug-sheet-actions">
          <button type="button" id="debug-expand" class="btn btn-ghost" title="Expand / Collapse" aria-label="Toggle console size">
            <svg id="debug-expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
              <path d="m6 9 6-6 6 6"/>
            </svg>
          </button>
          <button type="button" id="debug-clear" class="btn btn-ghost" title="Clear" aria-label="Clear console">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
              <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="debug-log" class="debug-log"></div>
    </div>
  </body>
</html>
