<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haddock - Sherlock OSINT</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <!-- Titlebar / Header -->
      <header>
        <div class="header-left">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <div>
            <h1>Haddock</h1>
            <span class="version">Sherlock OSINT</span>
          </div>
        </div>
        <div id="dep-status" class="dep-status">
          <span id="dep-dot" class="dot dot-checking"></span>
          <span id="dep-text">Checking...</span>
        </div>
      </header>

      <!-- Search bar -->
      <section class="search-section">
        <form id="search-form">
          <div class="search-bar">
            <div class="search-input-wrap">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input
                type="text"
                id="username-input"
                placeholder="Enter one or more usernames (space separated)..."
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <button type="submit" id="search-btn" class="btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              Search
            </button>
            <button type="button" id="cancel-btn" class="btn btn-cancel hidden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
              </svg>
              Cancel
            </button>
          </div>
        </form>
      </section>

      <!-- Options panel toggle -->
      <section class="options-section">
        <button type="button" id="options-toggle" class="options-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Advanced Options
          <svg id="options-chevron" class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>

        <div id="options-panel" class="options-panel hidden">
          <div class="options-grid">
            <!-- Timeout -->
            <div class="option-group">
              <label for="opt-timeout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                Timeout (seconds)
              </label>
              <input type="number" id="opt-timeout" value="60" min="1" max="300" />
            </div>

            <!-- Proxy -->
            <div class="option-group">
              <label for="opt-proxy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                  <rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/>
                  <line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/>
                </svg>
                Proxy
              </label>
              <input type="text" id="opt-proxy" placeholder="socks5://127.0.0.1:1080" />
            </div>

            <!-- Specific sites -->
            <div class="option-group option-group-wide">
              <label for="opt-sites">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                  <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                Specific sites (comma separated)
              </label>
              <input type="text" id="opt-sites" placeholder="GitHub, Twitter, Instagram..." />
            </div>

            <!-- Toggle options -->
            <div class="option-group">
              <div class="toggle-row">
                <label class="toggle-label" for="opt-nsfw">Include NSFW sites</label>
                <label class="toggle-switch">
                  <input type="checkbox" id="opt-nsfw" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>

            <div class="option-group">
              <div class="toggle-row">
                <label class="toggle-label" for="opt-print-all">Show not-found sites</label>
                <label class="toggle-switch">
                  <input type="checkbox" id="opt-print-all" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>

            <div class="option-group">
              <div class="toggle-row">
                <label class="toggle-label" for="opt-browse">Open results in browser</label>
                <label class="toggle-switch">
                  <input type="checkbox" id="opt-browse" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>

            <div class="option-group">
              <div class="toggle-row">
                <label class="toggle-label" for="opt-csv">Export CSV</label>
                <label class="toggle-switch">
                  <input type="checkbox" id="opt-csv" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>

            <div class="option-group">
              <div class="toggle-row">
                <label class="toggle-label" for="opt-xlsx">Export XLSX</label>
                <label class="toggle-switch">
                  <input type="checkbox" id="opt-xlsx" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>

            <div class="option-group">
              <div class="toggle-row">
                <label class="toggle-label" for="opt-debug">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="display:inline;vertical-align:middle;margin-right:2px">
                    <path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/>
                  </svg>
                  Debug mode
                </label>
                <label class="toggle-switch">
                  <input type="checkbox" id="opt-debug" />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Debug console -->
      <div id="debug-console" class="debug-console hidden">
        <div class="debug-header">
          <span>Debug Console</span>
          <button type="button" id="debug-clear" class="btn btn-ghost" title="Clear console" aria-label="Clear debug console">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            </svg>
          </button>
        </div>
        <div id="debug-log" class="debug-log"></div>
      </div>

      <!-- Progress bar -->
      <div id="progress-section" class="progress-section hidden">
        <div class="progress-info">
          <span id="progress-text" class="progress-text"></span>
          <span id="progress-counter" class="progress-counter"></span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <!-- Results toolbar -->
      <div id="results-toolbar" class="results-toolbar hidden">
        <div class="toolbar-left">
          <h2>Results</h2>
          <span id="result-count" class="badge">0</span>
          <span id="not-found-count" class="badge badge-muted hidden">0 not found</span>
        </div>
        <div class="toolbar-right">
          <input type="text" id="filter-input" class="filter-input" placeholder="Filter results..." />
          <button type="button" id="copy-btn" class="btn btn-ghost" title="Copy all URLs" aria-label="Copy all URLs">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
            </svg>
          </button>
          <button type="button" id="clear-btn" class="btn btn-ghost" title="Clear results" aria-label="Clear results">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Results grid -->
      <div id="results-grid" class="results-grid"></div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>Enter a username above to start searching across 400+ social networks</p>
      </div>
    </div>
  </body>
</html>
