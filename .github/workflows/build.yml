name: Build & Release Haddock

on:
  release:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from release tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set version in project files
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"

          # tauri.conf.json
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          # package.json
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

          # Cargo.toml
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Setup embedded Python + Sherlock + Tor
        shell: pwsh
        run: .\scripts\setup-python.ps1

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
