<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Pipe bowl — large, bold -->
  <path d="
    M 295 150
    L 295 250
    C 295 330, 385 340, 400 275
    C 412 220, 395 150, 348 142
    Z
  " fill="white"/>

  <!-- Bowl opening -->
  <ellipse cx="330" cy="152" rx="38" ry="16" fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="330" cy="152" rx="28" ry="11" fill="#4c1d95"/>

  <!-- Pipe stem — thick, clear curve -->
  <path d="
    M 295 235
    C 255 260, 195 268, 155 258
    C 120 248, 95 268, 72 310
    L 55 350
    C 52 358, 58 365, 66 362
    L 85 322
    C 105 280, 128 264, 162 270
    C 200 278, 255 272, 295 252
  " fill="white"/>

  <!-- Smoke wisps — thicker, more visible -->
  <path d="M 315 140 C 308 105, 330 85, 318 50 C 308 20, 325 5, 318 -15"
    fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="10" stroke-linecap="round"/>
  <path d="M 345 138 C 352 100, 335 78, 348 42 C 358 12, 342 -5, 350 -20"
    fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="8" stroke-linecap="round"/>
  <path d="M 370 148 C 378 115, 365 95, 375 60"
    fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6" stroke-linecap="round"/>
</svg>
